syntax = "proto3";

// provide user like service
// 1. add like


package like;
//import "idl/validate/validate.proto";
option go_package = "backend/core-server/internal/rpc/likepb;likepb";

// 1.点赞操作 和 取消点赞
message ThumbUpRequest {
  string userID = 1 ;
  string objectType = 2 ;
  string objectID = 3 ;
  string objectOwnerID = 4;
}

message ThumbUpResponse {
  bool success = 1;
}

message CancelThumbUpRequest{
  string userID = 1 ;
  string objectType = 2 ;
  string objectID = 3 ;
  string objectOwnerID = 4 ;
}

message CancelThumbUpResponse{
  bool success = 1;
}


service LikeService {
  rpc ThumbUp(ThumbUpRequest) returns (ThumbUpResponse){};
  rpc CancelThumbUp(CancelThumbUpRequest) returns (CancelThumbUpResponse){};
}